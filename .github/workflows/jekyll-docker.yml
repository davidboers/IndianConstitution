name: Jekyll site CI

on:
  push:
    branches: [ "wjekyll" ]
  pull_request:
    branches: [ "wjekyll" ]

permissions:
  contents: write

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to GitHub Pages
      uses: fabacab/jekyll-builder-for-github-pages-action@master
      with:
        secret_gh_pages_api_token: ${{ secrets.GH_PAGES_TOKEN }}
