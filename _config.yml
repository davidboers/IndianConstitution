# Site settings

url: 'https://davidboers.github.io'
baseurl: '/IndianConstitution'

defaults:
  -
    scope:
      path: "en"
    values:
      lang: "en"
      title-begin: "Table of Contents"

  -
    scope:
      path: "hi"
    values:
      lang: "hi"
      title-begin: "विषय सूची"

exclude:
  - README.md
  - scripts