    <p class="art"><ins>243J. Audit of accounts of Panchayats.—</ins></p>
    <div id="effective-date">Effective <span id="eff-day">24</span>/<span id="eff-month">4</span>/<span id="eff-year">1993</span></div>

    <p class="cl"><ins>The Legislature of a State may, by law, make provisions with respect to the maintenance of accounts by
        the Panchayats and the auditing of such accounts.</ins></p>
