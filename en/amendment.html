layout: default
title-begin: Amendment
---

<link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/static/assets/amendment.css">
<script src="https://unpkg.com/topojson-client@3" type="module"></script>
<script src="{{ site.baseurl }}/static/src/toggle-changes.js" type="module"></script>
<script src="{{ site.baseurl }}/static/src/amendment.js" type="module"></script>

<div id="container" class="page-margin">
    <div id="dashboard">
        <form>
            <label for="amendment">Select Amendment:</label>
            <select name="amendment" id="amendment"></select>
        </form>
        <div class="stats" style="display: none;">
            Added <span id="words-added"></span> words<br>
            Deleted <span id="words-deleted"></span> words
        </div>
        <div class="stats" style="display: none;">
            Added <span id="articles-added"></span> articles<br>
            Deleted <span id="articles-deleted"></span> articles
        </div>
        <button id="open-map" style="display: none;"><i class="fa-solid fa-map"></i></button>
    </div>
    <div id="articles"></div>
</div>

<div id="map" style="display: none;">
    <div style="display: flex; flex-direction: row;">
        <h2>Map of ratifying states</h2>
        <button id="close-map"><i class="fa-solid fa-x"></i></button>
    </div>
    <svg width="500px" height="500px"></svg>
</div>
