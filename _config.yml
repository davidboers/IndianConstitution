# Site settings

url: 'https://davidboers.github.io'
baseurl: '/IndianConstitution'

defaults:
  -
    scope:
      path: "en"
    values:
      lang: "en"
      title-begin: "Table of Contents"

  -
    scope:
      path: "hi"
    values:
      lang: "hi"

exclude:
  - README.md

plugins:
  - article_numbers
  - extract_margin

whitelist:
  - article_numbers
  - extract_margin