    <p class="art">150. Form of accounts of the Union and of the States.—</p>
    <div id="effective-date">Effective <span id="eff-day">20</span>/<span id="eff-month">6</span>/<span id="eff-year">1979</span></div>
    
    <p>The accounts of the Union and of the States shall be kept in such form as the President may, <span class="del">after
