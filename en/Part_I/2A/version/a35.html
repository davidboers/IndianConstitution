<p class="art"><ins>2A. Sikkim to be associated with the Union.—</ins></p>
<div id="effective-date">Effective <span id="eff-day">1</span>/<span id="eff-month">3</span>/<span id="eff-year">1975</span></div>

<p class="cl"><ins>Sikkim, which comprises the territories specified in the Tenth Schedule, shall be associated with the Union on the terms 
    and conditions set out in that Schedule.</ins></p>
