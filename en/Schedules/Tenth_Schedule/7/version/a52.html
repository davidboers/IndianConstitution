    <p class="art"><ins>7. Bar of jurisdiction of courts.—</ins></p>
    <div id="effective-date">Effective <span id="eff-day">1</span>/<span id="eff-month">3</span>/<span id="eff-year">1985</span></div>
    
    <p class="cl"><span class="ins">Notwithstanding anything in this Constitution, no court shall have any jurisdiction in respect of any 
        matter connected with the disqualification of a member of a House under this Schedule.</span></p>
