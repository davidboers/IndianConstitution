    <p class="art">215. High Courts to be courts of record.—</p>
    <div id="effective-date">Effective <span id="eff-day">26</span>/<span id="eff-month">1</span>/<span id="eff-year">1950</span></div>
    
    <p class="cl">Every High Court shall be a court of record and shall have all the powers of such a court including the power to punish 
        for contempt of itself.</p>
