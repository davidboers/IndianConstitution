    <p class="art">44. Uniform civil code for the citizens.—</p>
    <div id="effective-date">Effective <span id="eff-day">26</span>/<span id="eff-month">1</span>/<span id="eff-year">1950</span></div>
    
    <p>The State shall endeavour to secure for the citizens a uniform civil code throughout the territory of India.</p>
