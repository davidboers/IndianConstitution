    <p class="art">144. Civil and judicial authorities to act in aid of the Supreme Court.—</p>
    <div id="effective-date">Effective <span id="eff-day">26</span>/<span id="eff-month">1</span>/<span id="eff-year">1950</span></div>
    
    <p>All authorities, civil and judicial, in the territory of India shall act in aid of the Supreme Court.</p>
