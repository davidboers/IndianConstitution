    <p class="art">308. Interpretation.—</p>
    <div id="effective-date">Effective <span id="eff-day">1</span>/<span id="eff-month">11</span>/<span id="eff-year">1956</span></div>

    <p class="cl">In this Part, unless the context otherwise requires, the expression "State" <span class="del">means a State specified in 
        Part A or Part B of the First Schedule</span> <span class="ins">does not include the State of Jammu and Kashmir</span>.</p>
